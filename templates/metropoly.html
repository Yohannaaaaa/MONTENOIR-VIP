<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metropoly VIP</title>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<style>
  :root{
    --gold:#c9a86a;
    --gold-dim:#8a7550;
    --cream:#efe9db;
    --panel:#12151c;
    --slate:#5c6470;
    --brick:#a4453b;
    --emerald:#3a7d63;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    min-height:100%;
    background:radial-gradient(ellipse at 50% 0%, #171b24 0%, #0b0d12 60%);
    color:var(--cream);
    font-family:'Georgia','Times New Roman',serif;
  }
  .screen{
    display:none;
    min-height:100vh;
    flex-direction:column;
    align-items:center;
    padding:20px;
  }
  .screen.active{display:flex;}

  h1.brand{
    letter-spacing:6px;
    font-weight:400;
    font-size:26px;
    color:var(--gold);
    text-transform:uppercase;
    margin:6px 0 2px 0;
  }
  .tagline{
    color:var(--slate);
    font-size:11px;
    letter-spacing:3px;
    text-transform:uppercase;
    margin-bottom:24px;
  }

  .card{
    width:100%;
    max-width:420px;
    background:var(--panel);
    border:1px solid #22262f;
    border-radius:8px;
    padding:18px;
  }
  label{
    font-size:12px;
    color:var(--gold-dim);
    text-transform:uppercase;
    letter-spacing:1px;
    display:block;
    margin:12px 0 4px 0;
  }
  input[type=text]{
    width:100%;
    padding:10px 12px;
    background:#0d0f14;
    border:1px solid #22262f;
    border-radius:5px;
    color:var(--cream);
    font-size:15px;
    font-family:inherit;
  }
  .token-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
  .token-btn{
    font-size:20px;padding:8px 10px;background:#181b23;
    border:1px solid var(--gold-dim);border-radius:6px;cursor:pointer;
  }
