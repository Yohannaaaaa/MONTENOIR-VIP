<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metropoly VIP</title>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<style>
  :root{
    --gold:#c9a86a;
    --gold-dim:#8a7550;
    --cream:#efe9db;
    --panel:#12151c;
    --slate:#5c6470;
    --brick:#a4453b;
    --emerald:#3a7d63;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    min-height:100%;
    background:radial-gradient(ellipse at 50% 0%, #171b24 0%, #0b0d12 60%);
    color:var(--cream);
    font-family:'Georgia','Times New Roman',serif;
  }
  .screen{
    display:none;
    min-height:100vh;
    flex-direction:column;
    align-items:center;
    padding:20px;
  }
  .screen.active{display:flex;}

  h1.brand{
    letter-spacing:6px;
    font-weight:400;
    font-size:26px;
    color:var(--gold);
    text-transform:uppercase;
    margin:6px 0 2px 0;
  }
  .tagline{
    color:var(--slate);
    font-size:11px;
    letter-spacing:3px;
    text-transform:uppercase;
    margin-bottom:24px;
  }

  .card{
    width:100%;
    max-width:420px;
    background:var(--panel);
    border:1px solid #22262f;
    border-radius:8px;
    padding:18px;
  }
  label{
    font-size:12px;
    color:var(--gold-dim);
    text-transform:uppercase;
    letter-spacing:1px;
    display:block;
    margin:12px 0 4px 0;
  }
  input[type=text]{
    width:100%;
    padding:10px 12px;
    background:#0d0f14;
    border:1px solid #22262f;
    border-radius:5px;
    color:var(--cream);
    font-size:15px;
    font-family:inherit;
  }
  .token-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
  .token-btn{
    font-size:20px;padding:8px 10px;background:#181b23;
    border:1px solid var(--gold-dim);border-radius:6px;cursor:pointer;
  }
  .token-btn.selected{box-shadow:0 0 0 2px var(--gold);background:#22262f;}
  button{
    font-family:inherit;
    background:linear-gradient(180deg,#c9a86a,#a8875090);
    color:#141414;border:none;padding:11px 16px;border-radius:5px;
    font-size:13px;letter-spacing:1px;text-transform:uppercase;
    cursor:pointer;font-weight:bold;width:100%;margin-top:14px;
  }
  button.secondary{background:transparent;border:1px solid var(--gold-dim);color:var(--gold);}
  button:disabled{background:#333;color:#777;cursor:not-allowed;}
  .error-msg{color:var(--brick);font-size:13px;margin-top:8px;min-height:16px;}

  .room-code{font-size:32px;letter-spacing:4px;color:var(--gold);text-align:center;margin:10px 0;font-weight:bold;}
  .player-chip{
    display:flex;align-items:center;gap:8px;padding:8px 10px;
    background:#181b23;border-radius:6px;margin-bottom:6px;font-size:14px;
  }
  .player-chip .dot{width:8px;height:8px;border-radius:50%;}

  /* --- GAME --- */
  .game-wrap{width:100%;max-width:520px;}
  .board-image-wrap{
    width:100%;
    border-radius:8px;
    overflow:hidden;
    border:2px solid var(--gold-dim);
    box-shadow:0 0 24px rgba(201,168,106,.15);
  }
  .board-image-wrap img{
    width:100%;
    display:block;
  }

  .die3d{width:38px;height:38px;margin:0 auto;}
  .die-face{
    width:38px;height:38px;background:var(--cream);border:1px solid #999;
    border-radius:5px;display:grid;grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(3,1fr);padding:4px;
  }
  .die-face.rolling{animation:spin 0.9s ease-out;}
  @keyframes spin{
    0%{transform:rotate(0deg) scale(1);}
    50%{transform:rotate(360deg) scale(1.15);}
    100%{transform:rotate(720deg) scale(1);}
  }
  .pip{width:5px;height:5px;background:#1a1a1a;border-radius:50%;align-self:center;justify-self:center;opacity:0;}

  .dice-row{
    display:flex;align-items:center;justify-content:center;gap:12px;
    margin:14px 0 6px 0;
  }
  .dice-value{color:var(--gold);font-size:15px;font-weight:bold;}

  .panel{
    width:100%;background:var(--panel);border:1px solid #22262f;
    border-radius:6px;margin-top:12px;padding:12px;
  }
  .turn-banner{font-size:13px;color:var(--gold);text-align:center;margin-bottom:8px;min-height:18px;}
  .my-position{font-size:12px;color:var(--cream);text-align:center;margin-bottom:10px;}
  .players-strip{display:flex;gap:8px;overflow-x:auto;margin-bottom:10px;padding-bottom:6px;}
  .p-card{
    flex:0 0 auto;background:#181b23;border-radius:6px;padding:6px 10px;
    font-size:11px;border:1px solid #22262f;min-width:76px;text-align:center;
  }
  .p-card.active-turn{box-shadow:0 0 0 2px var(--gold);}
  .p-card .pmoney{color:var(--gold);font-weight:bold;font-size:12px;}

  .actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
  .actions button{width:auto;flex:1;min-width:110px;}

  .my-props{margin-top:10px;}
  .prop-row{
    display:flex;justify-content:space-between;align-items:center;
    background:#181b23;border-radius:5px;padding:6px 8px;margin-bottom:5px;font-size:11px;
  }
  .prop-row .build-btns{display:flex;gap:5px;}
  .prop-row button{width:auto;margin:0;padding:5px 8px;font-size:9px;}

  .log{
    font-size:11px;color:var(--slate);margin-top:10px;
    max-height:70px;overflow-y:auto;line-height:1.5;
  }
  .chat-box{display:flex;gap:6px;margin-top:10px;}
  .chat-box input{flex:1;}
  .chat-box button{width:auto;margin:0;padding:10px 14px;}
  .chat-log{font-size:11px;color:var(--cream);max-height:70px;overflow-y:auto;margin-top:6px;}
</style>
</head>
<body>

<!-- ============ LOGIN / CREATE-JOIN SCREEN ============ -->
<div class="screen active" id="screen-login">
  <h1 class="brand">Metropoly</h1>
  <div class="tagline">bâtis ton empire — multijoueur</div>

  <div class="card">
    <label>Ton pseudo</label>
    <input type="text" id="usernameInput" placeholder="Ex: Yohanna" maxlength="16">

    <label>Ton jeton</label>
    <div class="token-row" id="tokenRow">
      <div class="token-btn selected" data-token="🎩">🎩</div>
      <div class="token-btn" data-token="🚗">🚗</div>
      <div class="token-btn" data-token="🐕">🐕</div>
      <div class="token-btn" data-token="🚀">🚀</div>
      <div class="token-btn" data-token="⚓">⚓</div>
      <div class="token-btn" data-token="💎">💎</div>
    </div>

    <button id="createRoomBtn">Créer une salle</button>

    <label>Ou rejoindre avec un code</label>
    <input type="text" id="joinCodeInput" placeholder="Ex: MON-1234" style="text-transform:uppercase;">
    <button class="secondary" id="joinRoomBtn">Rejoindre la salle</button>

    <div class="error-msg" id="loginError"></div>
  </div>
</div>

<!-- ============ LOBBY SCREEN ============ -->
<div class="screen" id="screen-lobby">
  <h1 class="brand">Salle d'attente</h1>
  <div class="card">
    <div style="text-align:center;color:var(--slate);font-size:11px;text-transform:uppercase;letter-spacing:2px;">Code de la salle</div>
    <div class="room-code" id="roomCodeDisplay">—</div>
    <div id="lobbyPlayers"></div>
    <button id="startGameBtn">Démarrer la partie</button>
    <div class="error-msg" id="lobbyError"></div>
  </div>
</div>

<!-- ============ GAME SCREEN ============ -->
<div class="screen" id="screen-game">
  <div class="game-wrap">

    <div class="board-image-wrap">
      <img src="/static/metroploy_plateau_lux.png.png" alt="Plateau Metropoly">
    </div>

    <div class="dice-row">
      <div class="die3d"><div class="die-face" id="dieFace"></div></div>
      <div class="dice-value" id="lastDiceValue">—</div>
    </div>

    <div class="panel">
      <div class="turn-banner" id="turnBanner">En attente...</div>
      <div class="my-position" id="myPosition"></div>
      <div class="players-strip" id="playersStrip"></div>

      <div class="actions">
        <button id="rollBtn">Lancer le dé</button>
        <button id="buyBtn" class="secondary" disabled>Acheter</button>
        <button id="endTurnBtn" class="secondary">Fin de tour</button>
      </div>

      <div class="my-props" id="myProps"></div>

      <div class="log" id="gameLog"></div>

      <div class="chat-box">
        <input type="text" id="chatInput" placeholder="Message...">
        <button id="chatSendBtn">Envoyer</button>
      </div>
      <div class="chat-log" id="chatLog"></div>
    </div>
  </div>
</div>

<script>
const socket = io();

// ---- Cell data (mirrors backend METROPOLY_CELLS exactly) ----
const CELLS = [
  ["ALLEZ","start",0,0,"corner"],
  ["Banque","bank",0,0,"corner"],
  ["New York","property",220,24,"green"],
  ["Monaco","property",200,22,"green"],
  ["Aéroport International","transport",200,25,"transport"],
  ["Londres","property",200,22,"green"],
  ["Varsovie","property",100,12,"brown"],
  ["Zurich","property",100,12,"brown"],
  ["Prison","jail",0,0,"corner"],
  ["Paris","property",160,18,"orange"],
  ["Milan","property",140,16,"orange"],
  ["Amsterdam","property",140,16,"orange"],
  ["Compagnies des Eaux","utility",100,0,"utility"],
  ["Moscou","property",120,14,"purple"],
  ["Rome","property",100,12,"purple"],
  ["Madrid","property",100,12,"purple"],
  ["Impôts","tax",0,200,"tax"],
  ["Sofia","property",60,6,"yellow"],
  ["Belgrad","property",70,8,"yellow"],
  ["Gare Grande Vitesse","transport",100,25,"transport"],
  ["Istanbul","property",70,8,"yellow"],
  ["Prague","property",80,10,"blue"],
  ["Lisbonne","property",90,12,"blue"],
  ["Enchères","auction",0,0,"special"],
  ["Dubaï","property",160,18,"red"],
  ["Pékin","property",160,18,"red"],
  ["Compagnie Électrique","utility",150,0,"utility"],
  ["Tokyo","property",180,20,"red"]
];

// ---- State ----
let myUsername = '';
let myToken = '🎩';
let myRoomCode = '';
let lastState = null;
let canBuyNow = false;

// ---- DOM refs ----
const screens = {
  login: document.getElementById('screen-login'),
  lobby: document.getElementById('screen-lobby'),
  game: document.getElementById('screen-game')
};
function showScreen(name){
  Object.values(screens).forEach(s => s.classList.remove('active'));
  screens[name].classList.add('active');
}

// ---- Login screen ----
document.querySelectorAll('.token-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.token-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    myToken = btn.dataset.token;
  });
});

document.getElementById('createRoomBtn').addEventListener('click', ()=>{
  const u = document.getElementById('usernameInput').value.trim();
  if(!u){ document.getElementById('loginError').textContent = 'Entre un pseudo.'; return; }
  myUsername = u;
  socket.emit('monopoly_create_room', {username:u, token:myToken});
});

document.getElementById('joinRoomBtn').addEventListener('click', ()=>{
  const u = document.getElementById('usernameInput').value.trim();
  const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
  if(!u){ document.getElementById('loginError').textContent = 'Entre un pseudo.'; return; }
  if(!code){ document.getElementById('loginError').textContent = 'Entre un code de salle.'; return; }
  myUsername = u;
  socket.emit('monopoly_join_room', {username:u, token:myToken, code:code});
});

// ---- Lobby screen ----
document.getElementById('startGameBtn').addEventListener('click', ()=>{
  socket.emit('monopoly_start_game', {code: myRoomCode});
});

// ---- Game screen actions ----
document.getElementById('rollBtn').addEventListener('click', ()=>{
  socket.emit('monopoly_roll_dice', {code: myRoomCode, username: myUsername});
});
document.getElementById('buyBtn').addEventListener('click', ()=>{
  socket.emit('monopoly_buy_property', {code: myRoomCode, username: myUsername});
});
document.getElementById('endTurnBtn').addEventListener('click', ()=>{
  socket.emit('monopoly_end_turn', {code: myRoomCode});
});
document.getElementById('chatSendBtn').addEventListener('click', sendChat);
document.getElementById('chatInput').addEventListener('keydown', e=>{
  if(e.key === 'Enter') sendChat();
});
function sendChat(){
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if(!msg) return;
  socket.emit('monopoly_chat', {code: myRoomCode, username: myUsername, message: msg});
  input.value = '';
}

// ---- Dice pip layouts ----
const PIP_LAYOUT = {
  1:[5], 2:[1,9], 3:[1,5,9], 4:[1,3,7,9], 5:[1,3,5,7,9], 6:[1,3,4,6,7,9]
};
function renderDie(value){
  const face = document.getElementById('dieFace');
  face.innerHTML = '';
  for(let i=1;i<=9;i++){
    const p = document.createElement('div');
    p.className = 'pip';
    if(PIP_LAYOUT[value] && PIP_LAYOUT[value].includes(i)) p.style.opacity = '1';
    face.appendChild(p);
  }
}
renderDie(1);

function log(container, msg){
  const p = document.createElement('div');
  p.textContent = msg;
  container.prepend(p);
}

// ---- Render full room state ----
function renderState(state){
  lastState = state;
  const players = state.players || {};
  const names = Object.keys(players);

  const strip = document.getElementById('playersStrip');
  strip.innerHTML = '';
  const activeNames = names.filter(n => !players[n].bankrupt);
  const currentTurnName = activeNames[state.turnIndex % (activeNames.length || 1)];

  names.forEach(n=>{
    const p = players[n];
    const card = document.createElement('div');
    card.className = 'p-card' + (n === currentTurnName ? ' active-turn' : '');
    card.innerHTML = `<div>${p.token || '🎩'} ${n}</div><div class="pmoney">${p.money}€</div>` +
      (p.bankrupt ? '<div style="color:var(--brick);font-size:9px;">FAILLITE</div>' : '');
    strip.appendChild(card);
  });

  document.getElementById('turnBanner').textContent = state.started
    ? (currentTurnName === myUsername ? 'À toi de jouer !' : `Tour de ${currentTurnName || '...'}`)
    : 'En attente du lancement de la partie...';

  const me = players[myUsername];
  if(me){
    const cellName = (CELLS[me.position] || ['?'])[0];
    document.getElementById('myPosition').textContent = 'Tu es sur : ' + cellName + ' — ' + me.money + '€';
  }

  const owners = state.owners || {};
  const houses = state.houses || {};
  const hotels = state.hotels || {};
  const myPropsEl = document.getElementById('myProps');
  myPropsEl.innerHTML = '';
  Object.keys(owners).forEach(posStr=>{
    if(owners[posStr] !== myUsername) return;
    const idx = parseInt(posStr);
    const [name, typ] = CELLS[idx];
    if(typ !== 'property') return;
    const row = document.createElement('div');
    row.className = 'prop-row';
    const hasHotel = !!hotels[posStr];
    const houseCount = parseInt(houses[posStr] || 0);
    row.innerHTML = `<span>${name} ${hasHotel ? '(hôtel)' : houseCount ? '('+houseCount+' maison(s))' : ''}</span>`;
    const btnWrap = document.createElement('div');
    btnWrap.className = 'build-btns';
    if(!hasHotel){
      const hBtn = document.createElement('button');
      hBtn.textContent = houseCount < 4 ? '+ Maison' : '+ Hôtel';
      hBtn.addEventListener('click', ()=>{
        const evt = houseCount < 4 ? 'monopoly_add_house' : 'monopoly_add_hotel';
        socket.emit(evt, {code: myRoomCode, username: myUsername, cell: posStr});
      });
      btnWrap.appendChild(hBtn);
    }
    row.appendChild(btnWrap);
    myPropsEl.appendChild(row);
  });

  const isMyTurn = currentTurnName === myUsername && state.started && me && !me.bankrupt;
  document.getElementById('rollBtn').disabled = !isMyTurn || (me && me.hasRolled && state.lastDice !== 6);
  document.getElementById('endTurnBtn').disabled = !isMyTurn;
  document.getElementById('buyBtn').disabled = !(isMyTurn && canBuyNow);

  if(state.lastLog){
    log(document.getElementById('gameLog'), state.lastLog);
  }
}

// ---- Socket events ----
socket.on('monopoly_room_state', (state)=>{
  myRoomCode = state.code;
  document.getElementById('roomCodeDisplay').textContent = state.code;

  if(!state.started){
    showScreen('lobby');
    const lobbyPlayersEl = document.getElementById('lobbyPlayers');
    lobbyPlayersEl.innerHTML = '';
    Object.keys(state.players || {}).forEach(n=>{
      const p = state.players[n];
      const chip = document.createElement('div');
      chip.className = 'player-chip';
      chip.innerHTML = `<span class="dot" style="background:${p.color||'#c9a86a'}"></span> ${p.token||'🎩'} ${n}`;
      lobbyPlayersEl.appendChild(chip);
    });
  } else {
    showScreen('game');
  }
  canBuyNow = false;
  renderState(state);
});

socket.on('monopoly_animate_move', (data)=>{
  showScreen('game');
  document.getElementById('lastDiceValue').textContent = 'Dé : ' + data.dice;
  const face = document.getElementById('dieFace');
  face.classList.remove('rolling');
  void face.offsetWidth;
  face.classList.add('rolling');
  renderDie(data.dice);
  canBuyNow = !!data.pendingBuy;
  renderState(data.state);
});

socket.on('monopoly_error', (data)=>{
  const msg = (data && data.msg) || 'Erreur.';
  document.getElementById('loginError').textContent = msg;
  document.getElementById('lobbyError').textContent = msg;
  log(document.getElementById('gameLog'), '⚠ ' + msg);
});

socket.on('monopoly_chat_message', (data)=>{
  log(document.getElementById('chatLog'), (data.username||'?') + ': ' + data.message);
});
</script>

</body>
</html>
