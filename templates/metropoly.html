<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>METROPOLY VIP</title>
<link rel="stylesheet" href="/static/css/metropoly_lux.css">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>

<body class="metropoly-body">

<div class="top-bar">
    <a href="/jeux" class="top-btn">← JEUX</a>
    <input id="username" placeholder="Nom joueur">
    <select id="tokenSelect">
        <option value="horse">🐴 Cheval</option>
        <option value="jackpot">🎰 Machine</option>
        <option value="boat">🛥️ Bateau</option>
        <option value="car">🚗 Voiture</option>
        <option value="hat">🎩 Chapeau</option>
        <option value="cat">🐈 Chat noir</option>
    </select>
    <button onclick="createRoom()">Créer salle</button>
    <input id="roomCodeInput" placeholder="Code salle">
    <button onclick="joinRoom()">Entrer</button>
    <button onclick="startGame()">Démarrer</button>
</div>

<div class="left-panel">
    <button id="rollBtn" onclick="rollDice()">🎲 ZAR AT</button>
    <button id="buildHouseBtn" onclick="buildHouse()">🏠 EV AL</button>
    <button id="buildHotelBtn" onclick="buildHotel()">🏨 OTEL AL</button>
    <div id="buildHint">Ev için aynı renk serisini tamamla.</div>
</div>

<div class="right-panel">
    <h3>ONLINE</h3>
    <div id="playersList"></div>
</div>

<div id="gameArea">
    <div id="boardContainer">
        <img id="boardImg" src="/static/metroploy_plateau_lux.png.png" alt="Metropoly">
        <div id="overlay">
            <div id="diceArea">
                <img class="diceImg" src="/static/dice_gold.png">
                <img class="diceImg" src="/static/dice_gold.png">
            </div>
            <div id="tokens"></div>
            <div id="owners"></div>
            <div id="buildings"></div>
        </div>
    </div>
</div>

<div id="buyPanel" class="modal">
    <h2 id="buyCity">Ville</h2>
    <p id="buyPrice">Prix</p>
    <button onclick="buyProperty()">Acheter</button>
    <button onclick="hideBuy()">Annuler</button>
</div>

<div id="moneyToast"></div>

<script src="/static/js/metropoly.js"></script>
</body>
</html>
