<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metropoly VIP</title>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<style>
  :root{
    --gold:#c9a86a;
    --gold-dim:#8a7550;
    --cream:#efe9db;
    --panel:#12151c;
    --slate:#5c6470;
    --brick:#a4453b;
    --emerald:#3a7d63;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    min-height:100%;
    background:radial-gradient(ellipse at 50% 0%, #171b24 0%, #0b0d12 60%);
    color:var(--cream);
    font-family:'Georgia','Times New Roman',serif;
  }
  .screen{display:none;min-height:100vh;flex-direction:column;align-items:center;padding:20px;}
  .screen.active{display:flex;}
  h1.brand{letter-spacing:6px;font-weight:400;font-size:26px;color:var(--gold);text-transform:uppercase;margin:6px 0 2px 0;}
  .tagline{color:var(--slate);font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-bottom:24px;}
  .card{width:100%;max-width:420px;background:var(--panel);border:1px solid #22262f;border-radius:8px;padding:18px;}
  label{font-size:12px;color:var(--gold-dim);text-transform:uppercase;letter-spacing:1px;display:block;margin:12px 0 4px 0;}
  input[type=text]{width:100%;padding:10px 12px;background:#0d0f14;border:1px solid #22262f;border-radius:5px;color:var(--cream);font-size:15px;font-family:inherit;}
  .token-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
  .token-btn{font-size:20px;padding:8px 10px;background:#181b23;border:1px solid var(--gold-dim);border-radius:6px;cursor:pointer;}
  .token-btn.selected{box-shadow:0 0 0 2px var(--gold);background:#22262f;}
  button{font-family:inherit;background:linear-gradient(180deg,#c9a86a,#a8875090);color:#141414;border:none;padding:11px 16px;border-radius:5px;font-size:13px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-weight:bold;width:100%;margin-top:14px;}
  button.secondary{background:transparent;border:1px solid var(--gold-dim);color:var(--gold);}
  button:disabled{background:#333;color:#777;cursor:not-allowed;}
  .error-msg{color:var(--brick);font-size:13px;margin-top:8px;min-height:16px;}
  .room-code{font-size:32px;letter-spacing:4px;color:var(--gold);text-align:center;margin:10px 0;font-weight:bold;}
  .game-wrap{width:100%;max-width:1200px;display:grid;grid-template-columns:1fr 280px;gap:20px;}
  .board-section{position:relative;background:#1a1d25;border:2px solid var(--gold);border-radius:10px;padding:15px;aspect-ratio:1;overflow:hidden;}
  .board-img{width:100%;height:100%;background:url('/static/metroploy_plateau_lux.png.png') center/cover;position:relative;}
  .tokens-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
  .token{position:absolute;font-size:28px;transform:translate(-50%,-50%);transition:all 0.6s cubic-bezier(0.25,0.46,0.45,0.94);filter:drop-shadow(0 0 8px rgba(201,168,106,0.6));}
  .dice-section{display:flex;flex-direction:column;gap:15px;align-items:center;}
  .dice-container{display:flex;gap:15px;perspective:1200px;justify-content:center;}
  .die{width:60px;height:60px;position:relative;transform-style:preserve-3d;animation:rollDice 0.6s ease-out;}
  .die.rolling{animation:rollDice 0.8s cubic-bezier(0.34,1.56,0.64,1);}
  @keyframes rollDice{0%{transform:rotateX(0deg) rotateY(0deg) rotateZ(0deg);}50%{transform:rotateX(720deg) rotateY(720deg) rotateZ(360deg);}100%{transform:rotateX(0deg) rotateY(0deg) rotateZ(0deg);}}
  .face{position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#c9a86a,#a8875090);border:2px solid var(--gold);font-size:24px;font-weight:bold;color:#141414;}
  .face.face1{transform:translateZ(30px);}
  .face.face2{transform:rotateY(180deg) translateZ(30px);}
  .face.face3{transform:rotateY(90deg) translateZ(30px);}
  .face.face4{transform:rotateY(-90deg) translateZ(30px);}
  .face.face5{transform:rotateX(90deg) translateZ(30px);}
  .face.face6{transform:rotateX(-90deg) translateZ(30px);}
  .roll-btn{width:100%;background:linear-gradient(180deg,#3a7d63,#2a5d50)!important;color:white;padding:14px;font-size:16px;}
  .roll-btn:disabled{background:#555!important;}
  .roll-btn:hover:not(:disabled){box-shadow:0 0 15px rgba(58,125,99,0.8);}
  .right-panel{display:flex;flex-direction:column;gap:15px;}
  .panel-box{background:var(--panel);border:1px solid #22262f;border-radius:8px;padding:12px;font-size:13px;}
  .panel-title{color:var(--gold);font-weight:bold;margin-bottom:8px;text-transform:uppercase;font-size:11px;letter-spacing:1px;}
  .player-list{max-height:200px;overflow-y:auto;}
  .player-entry{padding:6px;margin:4px 0;background:#0d0f14;border-radius:4px;font-size:12px;border-left:3px solid var(--gold);}
  .last-log{color:var(--gold);font-size:12px;line-height:1.4;min-height:40px;}
  @media(max-width:900px){.game-wrap{grid-template-columns:1fr;}.board-section{aspect-ratio:auto;min-height:300px;}}
</style>
</head>
<body>

<a id="homeBtn" href="/" style="position: fixed; top: 20px; right: 20px; padding: 10px 20px; background: linear-gradient(180deg, #c9a86a, #a8875090); color: #141414; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 12px; z-index: 1000; letter-spacing: 1px;">ACCUEIL</a>

<script>
const homeTexts = {'en':'HOME','fr':'ACCUEIL','es':'INICIO','de':'HOME','it':'HOME','nl':'THUIS','ru':'ДОМА','ar':'الرئيسية','pt':'INICIO','pl':'STRONA GŁÓWNA','tr':'LOCA','ja':'ホーム','zh':'首页','ko':'홈'};
function updateHomeButtonLanguage(lang) {const homeBtn = document.getElementById('homeBtn');if (homeBtn && homeTexts[lang]) {homeBtn.textContent = homeTexts[lang];}}
const observer = new MutationObserver(() => {const currentLang = localStorage.getItem('language') || 'fr';updateHomeButtonLanguage(currentLang);});
observer.observe(document.body, { attributes: true, subtree: true });
document.addEventListener('DOMContentLoaded', () => {const currentLang = localStorage.getItem('language') || 'fr';updateHomeButtonLanguage(currentLang);});
</script>

<div id="loginScreen" class="screen active">
  <h1 class="brand">METROPOLY</h1>
  <p class="tagline">Bâtis ton empire – Multijoueur</p>
  <div class="card">
    <label>TON PSEUDO</label>
    <input type="text" id="username" placeholder="Yohanna">
    <label style="margin-top:16px">TON JETON</label>
    <div class="token-row">
      <button class="token-btn" data-token="🎩">🎩</button>
      <button class="token-btn" data-token="🚗">🚗</button>
      <button class="token-btn" data-token="🐕">🐕</button>
      <button class="token-btn" data-token="🚀">🚀</button>
      <button class="token-btn" data-token="⚓">⚓</button>
      <button class="token-btn" data-token="💎">💎</button>
    </div>
    <button id="createRoomBtn">CRÉER UNE SALLE</button>
    <label style="margin-top:16px">OU REJOINDRE AVEC UN CODE</label>
    <input type="text" id="roomCode" placeholder="EX: MON-1234">
    <button id="joinRoomBtn" class="secondary">REJOINDRE LA SALLE</button>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>

<div id="lobbyScreen" class="screen">
  <h1 class="brand">METROPOLY</h1>
  <p class="tagline">Bâtis ton empire – Multijoueur</p>
  <div class="card">
    <p style="text-align:center;margin-bottom:12px;">CODE SALLE</p>
    <div class="room-code" id="lobbyCode">MON-XXXX</div>
    <p style="color:var(--gold-dim);text-align:center;font-size:11px;margin-top:12px;">Partage ce code avec tes amis!</p>
    <p style="color:var(--gold);text-align:center;margin-top:16px;font-weight:bold;">JOUEURS</p>
    <div id="lobbyPlayers" style="margin:12px 0;"></div>
    <button id="startGameBtn">DÉMARRER LA PARTIE</button>
    <div class="error-msg" id="lobbyError"></div>
  </div>
</div>

<div id="gameScreen" class="screen">
  <h1 class="brand">METROPOLY</h1>
  <div class="game-wrap">
    <div class="board-section">
      <div class="board-img">
        <div class="tokens-layer" id="tokensLayer"></div>
      </div>
    </div>
    <div class="right-panel">
      <div class="dice-section">
        <div class="dice-container">
          <div class="die" id="die1">
            <div class="face face1">1</div>
            <div class="face face2">6</div>
            <div class="face face3">3</div>
            <div class="face face4">4</div>
            <div class="face face5">5</div>
            <div class="face face6">2</div>
          </div>
          <div class="die" id="die2">
            <div class="face face1">1</div>
            <div class="face face2">6</div>
            <div class="face face3">3</div>
            <div class="face face4">4</div>
            <div class="face face5">5</div>
            <div class="face face6">2</div>
          </div>
        </div>
        <button id="rollBtn" class="roll-btn">LANCER LES DÉS</button>
      </div>
      <div class="panel-box">
        <div class="panel-title">JOUEURS</div>
        <div class="player-list" id="playerList"></div>
      </div>
      <div class="panel-box">
        <div class="panel-title">DERNIER COUP</div>
        <div class="last-log" id="lastLog">En attente...</div>
      </div>
    </div>
  </div>
</div>

<script>
const socket = io();
let currentUser = '';
let currentToken = '🎩';
let currentRoom = '';
const audioContext = new (window.AudioContext || window.webkitAudioContext)();
function playDiceSound() {
  const osc = audioContext.createOscillator();
  const gain = audioContext.createGain();
  osc.connect(gain);gain.connect(audioContext.destination);
  osc.frequency.setValueAtTime(400, audioContext.currentTime);
  osc.frequency.exponentialRampToValueAtTime(200, audioContext.currentTime + 0.3);
  gain.gain.setValueAtTime(0.3, audioContext.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
  osc.start(audioContext.currentTime);osc.stop(audioContext.currentTime + 0.3);
}
const GRID_POS = [[50, 95], [50, 85], [50, 75], [50, 65], [50, 55], [50, 45], [50, 35], [50, 25],
[60, 5], [70, 5], [80, 5], [90, 5], [100, 5],
[100, 15], [100, 25], [100, 35], [100, 45], [100, 55], [100, 65], [100, 75], [100, 85],
[90, 95], [80, 95], [70, 95], [60, 95]];
function animateTokenMove(username, fromPos, toPos) {
  const layer = document.getElementById('tokensLayer');
  let tokenEl = layer.querySelector(`[data-user="${username}"]`);
  if (!tokenEl) {tokenEl = document.createElement('div');tokenEl.className = 'token';tokenEl.dataset.user = username;layer.appendChild(tokenEl);}
  const totalSteps = Math.abs(toPos - fromPos) || (28 - fromPos + toPos);
  let currentStep = 0;
  function moveStep() {
    const pos = (fromPos + currentStep) % 28;
    const [x, y] = GRID_POS[pos];
    tokenEl.style.left = x + '%';tokenEl.style.top = y + '%';
    currentStep++;
    if (currentStep <= totalSteps) {setTimeout(moveStep, 150);}
  }
  moveStep();
}
function showScreen(screenId) {document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));document.getElementById(screenId).classList.add('active');}
document.querySelectorAll('.token-btn').forEach(btn => {btn.addEventListener('click', () => {document.querySelectorAll('.token-btn').forEach(b => b.classList.remove('selected'));btn.classList.add('selected');currentToken = btn.dataset.token;});});
document.getElementById('createRoomBtn').addEventListener('click', () => {currentUser = document.getElementById('username').value.trim();if (!currentUser) {document.getElementById('loginError').textContent = 'Pseudo requis';return;}socket.emit('monopoly_create_room', { username: currentUser, token: currentToken });});
document.getElementById('joinRoomBtn').addEventListener('click', () => {currentUser = document.getElementById('username').value.trim();currentRoom = document.getElementById('roomCode').value.trim().toUpperCase();if (!currentUser || !currentRoom) {document.getElementById('loginError').textContent = 'Pseudo et code requis';return;}socket.emit('monopoly_join_room', { username: currentUser, token: currentToken, code: currentRoom });});
document.getElementById('startGameBtn').addEventListener('click', () => {socket.emit('monopoly_start_game', { code: currentRoom });});
document.getElementById('rollBtn').addEventListener('click', () => {playDiceSound();document.getElementById('die1').classList.add('rolling');document.getElementById('die2').classList.add('rolling');setTimeout(() => {socket.emit('monopoly_roll_dice', { code: currentRoom, username: currentUser });}, 800);});
socket.on('monopoly_room_state', (state) => {currentRoom = state.code;if (!state.started) {showScreen('lobbyScreen');document.getElementById('lobbyCode').textContent = state.code;const playersHtml = Object.keys(state.players).map(u => `<div class="player-entry">${state.players[u].token} ${u} — ${state.players[u].money}€</div>`).join('');document.getElementById('lobbyPlayers').innerHTML = playersHtml;} else {showScreen('gameScreen');document.getElementById('lastLog').textContent = state.lastLog || 'En attente...';const playersHtml = Object.keys(state.players).map(u => `<div class="player-entry">${state.players[u].token} ${u}<br/>${state.players[u].money}€</div>`).join('');document.getElementById('playerList').innerHTML = playersHtml;}});
socket.on('monopoly_animate_move', (data) => {const { username, from, to, dice1, dice2 } = data;document.getElementById('die1').textContent = dice1;document.getElementById('die2').textContent = dice2;document.getElementById('die1').classList.remove('rolling');document.getElementById('die2').classList.remove('rolling');animateTokenMove(username, from, to);});
socket.on('monopoly_error', (data) => {document.getElementById('loginError').textContent = data.msg;});
</script>

</body>
</html>
