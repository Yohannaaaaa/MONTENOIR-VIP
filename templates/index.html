<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metropoly</title>
<style>
  :root{
    --bg:#0b0d12;
    --panel:#12151c;
    --gold:#c9a86a;
    --gold-dim:#8a7550;
    --cream:#efe9db;
    --brick:#a4453b;
    --emerald:#3a7d63;
    --slate:#5c6470;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:radial-gradient(ellipse at 50% 0%, #171b24 0%, #0b0d12 60%);
    color:var(--cream);
    font-family:'Georgia', 'Times New Roman', serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:16px;
  }
  h1{
    font-family:'Georgia', serif;
    letter-spacing:6px;
    font-weight:400;
    font-size:28px;
    color:var(--gold);
    text-transform:uppercase;
    margin:8px 0 2px 0;
  }
  .tagline{
    color:var(--slate);
    font-size:11px;
    letter-spacing:3px;
    text-transform:uppercase;
    margin-bottom:14px;
  }
  .board-wrap{
    width:100%;
    max-width:520px;
    aspect-ratio:1/1;
    display:grid;
    grid-template-columns:repeat(6,1fr);
    grid-template-rows:repeat(6,1fr);
    gap:3px;
    background:#000;
    border:2px solid var(--gold-dim);
    border-radius:6px;
    padding:3px;
  }
  .cell{
    background:var(--panel);
    border-radius:3px;
    position:relative;
    display:flex;
    flex-direction:column;
