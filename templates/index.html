<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Montenoir VIP</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    width:100%;
    background:#000;
    font-family:Georgia,serif;
  }
  .container{
    position:relative;
    width:100%;
    margin:0 auto;
  }
  .container img{
    width:100%;
    display:block;
    background:#1a1200;
  }
  .lang-selector{
    position:absolute;
    top:20px;
    left:20px;
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    z-index:20;
    max-width:200px;
  }
  .lang-btn{
    width:32px;
    height:32px;
    border-radius:50%;
    border:2px solid #d4af37;
    background:#1a1a1a;
    font-size:16px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:all 0.3s;
  }
  .lang-btn.active{
    background:#d4af37;
    box-shadow:0 0 12px rgba(212,175,55,.9);
  }
  .lang-btn:hover{
    box-shadow:0 0 8px rgba(212,175,55,.8);
  }
  .top-nav{
    position:absolute;
    top:20px;
    right:20px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    z-index:10;
  }
  .top-nav a{
    text-decoration:none;
    color:#1a1200;
    font-weight:700;
    font-size:13px;
    padding:10px 18px;
    border-radius:20px;
    background:linear-gradient(145deg,#fff4b0,#d4af37 55%,#8a6a1f);
    border:1px solid #fff2ad;
    box-shadow:0 0 14px rgba(212,175,55,.6);
    white-space:nowrap;
  }
  .bottom-nav{
    position:absolute;
    bottom:40px;
    left:0;
    right:0;
    display:flex;
    justify-content:center;
    gap:16px;
    flex-wrap:wrap;
    z-index:10;
  }
  .bottom-nav a{
    text-decoration:none;
    color:#1a1200;
    font-weight:800;
    font-size:15px;
    letter-spacing:1px;
    padding:14px 30px;
    border-radius:22px;
    background:linear-gradient(145deg,#fff4b0,#d4af37 55%,#8a6a1f);
    border:2px solid #fff2ad;
    box-shadow:0 0 20px rgba(212,175,55,.7);
  }
  @media(max-width:480px){
    .lang-selector{top:12px;left:12px;max-width:180px;}
    .lang-btn{width:28px;height:28px;font-size:14px;}
    .top-nav{top:12px;right:12px;}
    .top-nav a{font-size:11px;padding:8px 12px;}
    .bottom-nav{bottom:30px;}
    .bottom-nav a{font-size:13px;padding:12px 22px;}
  }
</style>
</head>
<body>
  <div class="container">
    <img src="/static/PAGEDECOUVERTURE.lux.site.jpeg" alt="Montenoir VIP">
    
    <div class="lang-selector" id="langSelector"></div>
    
    <div class="top-nav">
      <a href="/register" class="text-register">📝 <span>Register</span></a>
      <a href="/login" class="text-login">👤 <span>Login</span></a>
      <a href="/premium" class="text-premium">💎 <span>Premium</span></a>
    </div>
    <div class="bottom-nav">
      <a href="/games" class="text-games">🎮 <span>GAMES</span></a>
      <a href="/tarot" class="text-tarot">🔮 <span>TAROT & RITUAL</span></a>
    </div>
  </div>

  <script>
    const translations = {
      en: {
        register: 'Register',
        login: 'Login',
        premium: 'Premium',
        games: 'GAMES',
        tarot: 'TAROT & RITUAL'
      },
      fr: {
        register: 'Inscription',
        login: 'Connexion',
        premium: 'Premium',
        games: 'JEUX',
        tarot: 'TAROT & RITUEL'
      },
      es: {
        register: 'Registro',
        login: 'Iniciar sesión',
        premium: 'Premium',
        games: 'JUEGOS',
        tarot: 'TAROT Y RITUAL'
      },
      de: {
        register: 'Registrierung',
        login: 'Anmelden',
        premium: 'Premium',
        games: 'SPIELE',
        tarot: 'TAROT & RITUAL'
      },
      it: {
        register: 'Registrazione',
        login: 'Accedi',
        premium: 'Premium',
        games: 'GIOCHI',
        tarot: 'TAROCCHI E RITUALE'
      },
      nl: {
        register: 'Registreren',
        login: 'Inloggen',
        premium: 'Premium',
        games: 'SPELLEN',
        tarot: 'TAROT & RITUAAL'
      },
      ru: {
        register: 'Регистрация',
        login: 'Вход',
        premium: 'Premium',
        games: 'ИГРЫ',
        tarot: 'ТАРО И РИТУАЛ'
      },
      ar: {
        register: 'تسجيل',
        login: 'دخول',
        premium: 'Premium',
        games: 'ألعاب',
        tarot: 'التارو والطقس'
      },
      pt: {
        register: 'Registrar',
        login: 'Entrar',
        premium: 'Premium',
        games: 'JOGOS',
        tarot: 'TARÔ E RITUAL'
      },
      pl: {
        register: 'Rejestracja',
        login: 'Zaloguj się',
        premium: 'Premium',
        games: 'GRY',
        tarot: 'TAROT I RYTUAŁ'
      },
      tr: {
        register: 'Kayıt Ol',
        login: 'Giriş Yap',
        premium: 'Premium',
        games: 'OYUNLAR',
        tarot: 'TAROT VE RITÜEL'
      },
      ja: {
        register: '登録',
        login: 'ログイン',
        premium: 'Premium',
        games: 'ゲーム',
        tarot: 'タロット&儀式'
      },
      zh: {
        register: '注册',
        login: '登录',
        premium: 'Premium',
        games: '游戏',
        tarot: '塔罗和仪式'
      },
      ko: {
        register: '등록',
        login: '로그인',
        premium: 'Premium',
        games: '게임',
        tarot: '타로 & 의식'
      }
    };

    const languages = [
      {code: 'en', flag: '🇬🇧'},
      {code: 'fr', flag: '🇫🇷'},
      {code: 'es', flag: '🇪🇸'},
      {code: 'de', flag: '🇩🇪'},
      {code: 'it', flag: '🇮🇹'},
      {code: 'nl', flag: '🇳🇱'},
      {code: 'ru', flag: '🇷🇺'},
      {code: 'ar', flag: '🇸🇦'},
      {code: 'pt', flag: '🇵🇹'},
      {code: 'pl', flag: '🇵🇱'},
      {code: 'tr', flag: '🇹🇷'},
      {code: 'ja', flag: '🇯🇵'},
      {code: 'zh', flag: '🇨🇳'},
      {code: 'ko', flag: '🇰🇷'}
    ];

    let currentLang = 'en';

    // Build language selector
    const selector = document.getElementById('langSelector');
    languages.forEach(lang => {
      const btn = document.createElement('button');
      btn.className = 'lang-btn' + (lang.code === 'en' ? ' active' : '');
      btn.textContent = lang.flag;
      btn.title = lang.code.toUpperCase();
      btn.dataset.lang = lang.code;
      btn.addEventListener('click', switchLanguage);
      selector.appendChild(btn);
    });

    function switchLanguage(e) {
      const lang = e.target.dataset.lang;
      if(lang === currentLang) return;
      
      currentLang = lang;
      
      // Update active button
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      
      // Update text
      const t = translations[lang];
      document.querySelector('.text-register span').textContent = t.register;
      document.querySelector('.text-login span').textContent = t.login;
      document.querySelector('.text-premium span').textContent = t.premium;
      document.querySelector('.text-games span').textContent = t.games;
      document.querySelector('.text-tarot span').textContent = t.tarot;

      // Set page direction if Arabic
      document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
    }
  </script>
</body>
</html>
