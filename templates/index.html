<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Montenoir VIP</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    width:100%;
    background:#000;
    font-family:Georgia,serif;
  }
  .container{
    position:relative;
    width:100%;
    margin:0 auto;
  }
  .container img{
    width:100%;
    display:block;
    background:#1a1200;
  }
  .lang-selector{
    position:absolute;
    top:20px;
    left:20px;
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    z-index:20;
    max-width:200px;
  }
  .lang-btn{
    width:32px;
    height:32px;
    border-radius:50%;
    border:2px solid #d4af37;
    background:#1a1a1a;
    font-size:16px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:all 0.3s;
  }
  .lang-btn.active{
    background:#d4af37;
    box-shadow:0 0 12px rgba(212,175,55,.9);
  }
  .lang-btn:hover{
    box-shadow:0 0 8px rgba(212,175,55,.8);
  }
  .top-nav{
    position:absolute;
    top:20px;
    right:20px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    z-index:10;
  }
  .top-nav a{
    text-decoration:none;
    color:#1a1200;
    font-weight:700;
    font-size:13px;
    padding:10px 18px;
    border-radius:20px;
    background:linear-gradient(145deg,#fff4b0,#d4af37 55%,#8a6a1f);
    border:1px solid #fff2ad;
    box-shadow:0 0 14px rgba(212,175,55,.6);
    white-space:nowrap;
  }
  .bottom-nav{
    position:absolute;
    bottom:40px;
    left:0;
    right:0;
    display:flex;
    justify-content:center;
    gap:16px;
    flex-wrap:wrap;
    z-index:10;
  }
  .bottom-nav a{
    text-decoration:none;
    color:#1a1200;
    font-weight:800;
    font-size:15px;
    letter-spacing:1px;
    padding:14px 30px;
    border-radius:22px;
    background:linear-gradient(145deg,#fff4b0,#d4af37 55%,#8a6a1f);
    border:2px solid #fff2ad;
    box-shadow:0 0 20px rgba(212,175,55,.7);
  }
  @media(max-width:480px){
    .lang-selector{top:12px;left:12px;max-width:180px;}
    .lang-btn{width:28px;height:28px;font-size:14px;}
    .top-nav{top:12px;right:12px;}
    .top-nav a{font-size:11px;padding:8px 12px;}
    .bottom-nav{bottom:30px;}
    .bottom-nav a{font-size:13px;padding:12px 22px;}
  }
</style>
</head>
<body>
  <div class="container">
    <img src="/static/PAGEDECOUVERTURE.lux.site.jpeg" alt="Montenoir VIP">
    
    <div class="lang-selector" id="langSelector"></div>
    
    <div class="top-nav">
      <a href="/register" class="text-register">📝 <span>Register</span></a>
      <a href="/login" class="text-login">👤 <span>Login</span></a>
